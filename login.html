<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Pragma" content="no-cache" />
    <title>登录 · LLM Video Studio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient ambient-a" aria-hidden="true"></div>
    <div class="ambient ambient-b" aria-hidden="true"></div>
    <div class="ambient ambient-c" aria-hidden="true"></div>

    <section id="loginView" class="login-view">
      <div class="login-shell reveal">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M5.4 7.2c2.4-3.7 7.6-4.4 10.9-1.5 3.4 2.9 3.4 8.1 0 11-3.3 2.9-8.5 2.2-10.9-1.5 2.6 1.7 6.1 1.3 8.2-.9 2.2-2.3 2.2-5.9 0-8.2-2.1-2.2-5.6-2.6-8.2-.9Z" />
              <path d="M7.8 12.1c0-2.2 1.8-4 4-4 1.1 0 2.1.4 2.8 1.1a5.3 5.3 0 0 0-7.4-4.8A7.5 7.5 0 1 1 7.2 20a5.3 5.3 0 0 0 7.4-4.8 4 4 0 0 1-6.8-3.1Z" opacity=".72" />
            </svg>
          </span>
          <div>
            <p class="eyebrow">LLM API · v1/videos</p>
            <h1>Video Studio</h1>
          </div>
        </div>

        <div class="login-copy">
          <h2>用一把 API Key 进入视频生成工作台</h2>
          <p>静态前端直连 <code>/v1/videos</code>，支持 Sora 文生视频、Veo 文生视频与参考图视频任务。</p>
        </div>

        <form id="loginForm" class="auth-form" autocomplete="on">
          <label for="apiKeyInput">LLMAPI 认证 Key</label>
          <div class="secret-field">
            <input
              id="apiKeyInput"
              name="apiKey"
              type="password"
              inputmode="text"
              placeholder="sk-..."
              autocomplete="off"
              required
            />
            <button type="button" id="toggleKeyButton" class="ghost-button compact" aria-label="显示或隐藏 API Key">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2.8 12s3.4-6.2 9.2-6.2S21.2 12 21.2 12 17.8 18.2 12 18.2 2.8 12 2.8 12Zm9.2 3.1a3.1 3.1 0 1 0 0-6.2 3.1 3.1 0 0 0 0 6.2Z" />
              </svg>
            </button>
          </div>

          <label for="baseUrlInput">API Base URL</label>
          <input id="baseUrlInput" name="baseUrl" type="url" placeholder="https://your-llm-api.example.com" />
          <p class="field-hint">会自动拼接为 <code>BASE_URL/v1/videos</code>；如果已填到 <code>/v1</code>，则只追加 <code>/videos</code>。</p>

          <label class="check-row" for="rememberKeyInput">
            <input id="rememberKeyInput" type="checkbox" checked />
            <span>在此浏览器保存登录信息</span>
          </label>

          <p id="loginError" class="form-error" role="alert"></p>
          <button class="primary-button" type="submit">
            进入工作台
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M13.2 5.4 19.8 12l-6.6 6.6-1.4-1.4 4.2-4.2H4.5v-2H16l-4.2-4.2 1.4-1.4Z" />
            </svg>
          </button>
        </form>
      </div>
    </section>

    <script src="./video-studio.js?v=20260528-1738"></script>
  </body>
</html>
